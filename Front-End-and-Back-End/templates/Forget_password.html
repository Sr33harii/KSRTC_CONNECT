{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSRTC Bus Service - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        :root {
            --white-color: hsl(0, 0%, 100%);
            --body-font: 'Poppins', sans-serif;
            --h1-font-size: 1.8rem;
            --normal-font-size: 1rem;
            --small-font-size: .875rem;
            --font-medium: 500;
        }

        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body, input, button {
            font-size: var(--normal-font-size);
            font-family: var(--body-font);
        }

        body {
            color: var(--white-color);
        }

        input, button {
            border: none;
            outline: none;
        }

        a {
            text-decoration: none;
        }

        .forgot {
            position: relative;
            height: 100vh;
            display: grid;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Image */
        .forgot__img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Dark Overlay */
        .forgot::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .forgot__form {
            background-color: hsla(0, 0%, 10%, 0.4);
            border: 2px solid var(--white-color);
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px hsla(0, 0%, 0%, 0.5);
            max-width: 400px;
            width: 100%;
        }

        .forgot__title {
            text-align: center;
            font-size: var(--h1-font-size);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .forgot__content {
            display: grid;
            row-gap: 1.8rem;
        }

        .forgot__box {
            position: relative;
            border-bottom: 2px solid var(--white-color);
            padding-bottom: 0.5rem;
        }

        .forgot__input {
            width: 100%;
            padding-block: 1rem;
            background: none;
            color: var(--white-color);
            font-size: 1rem;
        }

        .forgot__label {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-weight: var(--font-medium);
            transition: 0.3s;
            pointer-events: none;
        }

        .forgot__input:focus + .forgot__label,
        .forgot__input:not(:placeholder-shown) + .forgot__label {
            top: -0.5rem;
            font-size: var(--small-font-size);
            background: rgba(0,0,0,0.7);
            padding: 0 0.5rem;
            border-radius: 4px;
        }

        .forgot__button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            background-color: var(--white-color);
            color: #c53030;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
        }

        .forgot__button:hover {
            background-color: #f0f0f0;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            color: white;
            font-size: var(--small-font-size);
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="forgot">
        <!-- Background Image -->
        <img src="/static/img/background.jpeg" class="forgot__img" alt="Background">

        <form action="/myapp/forgotpassword_post/" method="post" class="forgot__form">
            {% csrf_token %}

            <h1 class="forgot__title">Forgot Password</h1>

            <div class="forgot__content">
                <div class="forgot__box">
                    <input type="text" name="email" id="email" required class="forgot__input" placeholder=" ">
                    <label class="forgot__label">Email Id</label>
                </div>
            </div>

            <button type="submit" class="forgot__button">Send Reset Link</button>
            <a href="/myapp/login_get/" class="back-link">Back to Login</a>
        </form>
    </div>

</body>
</html>
