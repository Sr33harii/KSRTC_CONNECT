{% extends "adminhome.html" %}
{% block body %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Stop</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center">Edit Stop</h2>
                <form action="/myapp/edit_fair_post/" method="post">
                {% csrf_token %}
                <input type="hidden" name="id" value="{{ data.id }}">
                    <div class="form-group">
                        <label for="strating">from Stop</label>
                        <select name="fromstop" class="form-control">
                            {% for i in r %}
                            <option value="{{ i.id }}" {% if i.id == data.FROMSTOP.id %}selected{% endif %}>{{ i.stop }}</option>
                            {% endfor %}
                        </select>
                    </div>
                   <div class="form-group">
                        <label for="strating">to Stop</label>
                        <select name="tostop" class="form-control">
                            {% for i in r %}
                            <option value="{{ i.id }}" {% if i.id == data.TOSTOP.id %}selected{% endif %}>{{ i.stop }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="destination">amount</label>
                        <input type="text" class="form-control" name="amount" id="destination" value="{{ data.amount }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Edit</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>

{% endblock %}
